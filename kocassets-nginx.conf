server {
    listen 8089;
    server_name kocassets.hikvisionlatam.tech;

    # Logs
    access_log /var/log/nginx/kocassets_access.log;
    error_log  /var/log/nginx/kocassets_error.log;

    # CORS headers para AEM
    add_header Access-Control-Allow-Origin  * always;
    add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
    add_header Access-Control-Allow-Headers 'Content-Type, apikey, Authorization' always;

    # Archivos estáticos de UGC
    location /ugc/ {
        alias /var/www/kocassets/ugc/;
        autoindex off;

        # Cache aggressively — los assets no cambian frecuentemente
        expires 7d;
        add_header Cache-Control 'public, immutable';

        # Soporte para thumbnails WebP
        location ~* \.(webp|jpg|jpeg|png|gif|mp4|webm)$ {
            expires 30d;
            add_header Cache-Control 'public, immutable';
        }
    }

    # Root del server — redirect a /ugc/
    location = / {
        return 302 /ugc/;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}